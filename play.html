<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>播放 - 奶声馆</title>
    <style>
* {margin: 0;padding: 0;box-sizing: border-box;}
body {
    font-family: "Microsoft YaHei", sans-serif;
    background-color: #111;
    color: #ccc;
    padding: 20px;
    max-width: 900px;
    margin: 0 auto;
}
.header-nav {
    display: flex;align-items: center;gap: 25px;
    background: #1a1a1a;padding: 14px 20px;border-radius: 10px;
    border: 1px solid #2a2a2a;margin-bottom: 20px;flex-wrap: wrap;
}
.header-nav h1 {font-size: 22px;color: #2ecc71;cursor: pointer;}
.header-nav a {font-size: 14px;color: #999;cursor: pointer;text-decoration: none;}
.header-nav a:hover {color: #2ecc71;}

.video-player {
    width: 100%;
    max-width: 100%;
    aspect-ratio: 16/9;
    margin: 0 auto 20px;
    background: #000;
    border-radius: 10px;
    overflow: hidden;
}
video {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: contain;
}

.video-title {
    font-size: 18px;
    color: #ddd;
    margin-bottom: 10px;
    text-align: center;
}
.tips {
    color: #ff9500;
    margin: 10px 0 30px;
    font-size: 12px;
    text-align: center;
}

.rec-title {
    font-size: 16px;
    color: #2ecc71;
    margin: 40px 0 15px;
    padding-left: 10px;
    border-left: 4px solid #2ecc71;
}
.rec-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 16px;
}
.rec-card {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    overflow: hidden;
    cursor: pointer;
    transition: 0.2s;
}
.rec-card:hover {
    border-color: #2ecc71;
    transform: translateY(-2px);
}
.rec-cover {
    width: 100%;
    height: 90px;
    background: #181818;
}
.rec-cover img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}
.rec-name {
    padding: 8px;
    font-size: 12px;
    color: #bbb;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
}
    </style>
</head>
<body>
<div class="header-nav">
    <h1 onclick="location.href='index.html'">奶声馆</h1>
    <a onclick="history.back()">返回上页</a>
</div>

<div class="video-title" id="playTitle">加载中...</div>
<div class="video-player">
    <video id="player" controls crossorigin="anonymous"></video>
</div>
<div class="tips" id="playTips"></div>

<h3 class="rec-title">相关推荐</h3>
<div class="rec-list" id="recList"></div>

<script src="video-data.js"></script>
<script>
(async function(){
    await syncVideoData();
    const urlParams = new URLSearchParams(window.location.search);
    const vid = urlParams.get('id');
    const video = videoData.find(v => v.id == vid);

    if (video) {
        document.getElementById("playTitle").innerText = video.title;
        let videoSrc = video.fileUrl;

        // ✅ 关键修复：自动转镜像播放
        videoSrc = videoSrc
            .replace("https://huggingface.co", "https://hf-mirror.com")
            .replace("https://hf.co", "https://hf-mirror.com");

        let tipsText = "Huggingface 镜像播放 · 全网可看";

        document.getElementById("player").src = videoSrc;
        document.getElementById("playTips").innerText = tipsText;
    } else {
        document.getElementById("playTitle").innerText = "视频不存在或已删除";
    }

    renderRecommend(vid);
})();

function renderRecommend(vid) {
    if(!vid || !videoData) return;
    const nowId = Number(vid);
    let recData = videoData.filter(item => item.id !== nowId);
    recData.sort(() => 0.5 - Math.random());
    recData = recData.slice(0, 6);

    let html = "";
    if(recData.length === 0){
        html = '<div style="grid-column:1/-1;text-align:center;color:#666;font-size:13px;">暂无更多视频</div>';
    }else{
        recData.forEach(item=>{
            html += `
            <div class="rec-card" onclick="location.href='play.html?id=${item.id}'">
                <div class="rec-cover">
                    <img src="${item.thumb}" alt="">
                </div>
                <div class="rec-name">${item.title}</div>
            </div>
            `;
        })
    }
    document.getElementById("recList").innerHTML = html;
}
</script>
</body>
</html>
